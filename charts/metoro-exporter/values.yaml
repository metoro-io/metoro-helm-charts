# Exporter
exporter:
  metadata:
    name: "metoro-exporter"
    podAnnotations: {}
    selectorLabels:
      app.kubernetes.io/name: "metoro-exporter"
  replicas: 2
  updateStrategy:
    type: "RollingUpdate"
  # Pod Disruption Budget configuration
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  envVars:
    mandatory:
      otlpUrl: "https://us-east.metoro.io/ingest/api/v1/otel"
      apiServerUrl: "https://us-east.metoro.io/api/v1/exporter"
      shouldDropMetoroData: "true"
    optional:
      # Comma-separated selectors for Kubernetes resources to watch (for example: "pod,service,deployment,ingress").
      # Leave empty to watch all exporter-supported resources.
      k8sResources: ""
    userDefined: {}
  image:
    tag: "v2-stable"
    repository: quay.io/metoro/metoro-exporter
    pullPolicy: "Always"
    imagePullSecrets: [ ]
  # Placeholder configmap
  configMap:
    name: "exporter-config"
    values:
      config.yml: |-
        # Placeholder config
  serviceAccount:
    name: "metoro-exporter"
  clusterRole:
    name: "metoro-exporter-cluster-role"
  clusterRoleBinding:
    name: "metoro-exporter-cluster-role-binding"
  services:
    metoroExporter:
      name: "metoro-exporter"
      port: 80
  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"
  secret:
    name: "exporter-secret"
    bearerToken: "CHANGE_ME"
    externalSecret:
      enabled: false
      name: "CHANGE_ME"
      secretKey: "AUTH_TOKEN"
  scheduling:
    nodeSelector: {}
    affinity: {}
    tolerations: []
  autoscaling:
    horizontalPodAutoscaler:
      enabled: true
      name: "metoro-exporter-hpa"
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  gracefulShutdown:
    enabled: true
    # Time to wait for inflight requests to complete after SIGTERM
    terminationGracePeriodSeconds: 15
# Node Agent
nodeAgent:
  metadata:
    name: "metoro-node-agent"
    podAnnotations: {}
    selectorLabels:
      app.kubernetes.io/name: "metoro-node-agent"
  envVars:
    mandatory: {}
    userDefined: {}
  updateStrategy:
    type: "RollingUpdate"
  prometheus:
    scrape: true
    # Port numbers below 1024 are often blocked. If you change this port, make sure it is open.
    port: "8080"
  image:
    repository: quay.io/metoro/metoro-node-agent
    tag: "v2-stable"
    # This should be kept as Always in the vast majority of cases. The node agent restarts itself each day in order to pick up the latest agent image.
    # If this is set to anything else, the node agent will fall behind and miss out on new features, bug fixes and security patches.
    pullPolicy: "Always"
    imagePullSecrets: []
  # The below resources are tuned for a typical deployment. Around 200k requests per node per hour. Reach out for help tuning these values.
  resources:
    limits:
      cpu: "1"
      memory: "2Gi"
    requests:
      cpu: "300m"
      memory: "300Mi"
  priorityClassName: ""
  logExport:
    enabled: true
  scheduling:
    affinity:
       nodeAffinity:
         requiredDuringSchedulingIgnoredDuringExecution:
           nodeSelectorTerms:
             # We can't run on Fargate (or any other serverless platform) as we don't have access to the host to run ebpf programs
             - matchExpressions:
                 - key: eks.amazonaws.com/compute-type
                   operator: NotIn
                   values:
                     - fargate
    tolerations: []
    nodeSelector: {}

redis:
  enabled: true
  auth:
    enabled: false
    existingSecret: "redis-secret"
    existingSecretPasswordKey: "password"
  architecture: standalone
  fullnameOverride: "metoro-redis"
  image:
    registry: "quay.io"
    repository: "metoro/redis"
    tag: "7.4.0-debian-12-r4"
    pullPolicy: "IfNotPresent"
  master:
    resourcesPreset: "medium"
    startupProbe:
      initialDelaySeconds: 5
    livenessProbe:
      initialDelaySeconds: 5
    readinessProbe:
      initialDelaySeconds: 5
    persistence:
      enabled: true

redisCluster:
  enabled: false
  auth:
    enabled: false
    existingSecret: "redis-secret"
    existingSecretPasswordKey: "password"
  architecture: "replication"
  rbac:
    create: true
  sentinel:
    enabled: true
    quorum: 2
    service:
      createMaster: true
    startupProbe:
      initialDelaySeconds: 5
    livenessProbe:
      initialDelaySeconds: 5
    readinessProbe:
      initialDelaySeconds: 5
  fullnameOverride: "metoro-redis"
  pdb:
    create: true
    maxUnavailable: 1
  replica:
    replicaCount: 3
    resourcesPreset: "micro"
    automountServiceAccountToken: true
    livenessProbe:
      initialDelaySeconds: 5
    readinessProbe:
      initialDelaySeconds: 5
    startupProbe:
      initialDelaySeconds: 5
    persistence:
      enabled: true

# Plugins scrape metrics from sources outside the cluster and ship them to Metoro
# through the in-cluster exporter. Each plugin runs as its own single-replica
# deployment containing the scraper plus a small OpenTelemetry collector sidecar.
plugins:
  # Scrapes AWS CloudWatch metrics using YACE (yet-another-cloudwatch-exporter).
  # Resources are discovered via the AWS tagging API, so the IAM role/user needs:
  #   cloudwatch:ListMetrics, cloudwatch:GetMetricData, tag:GetResources
  # Note: CloudWatch charges ~$0.01 per 1,000 metrics requested via GetMetricData.
  # The defaults below (5 minute period, explicit service opt-in) are chosen to keep
  # that cost low. Use searchTags to narrow discovery to the resources you care about.
  cloudwatch:
    enabled: false
    aws:
      # Region used for STS authentication.
      stsRegion: "us-east-1"
      # Regions to discover and scrape resources in. Can be overridden per service.
      regions: ["us-east-1"]
      auth:
        # IAM role ARN for IRSA on EKS. Rendered as the eks.amazonaws.com/role-arn
        # annotation on the plugin's service account. Leave empty if credentials come
        # from elsewhere (EKS Pod Identity, node instance profile, or existingSecret).
        roleArn: ""
        # Name of an existing secret containing AWS_ACCESS_KEY_ID and
        # AWS_SECRET_ACCESS_KEY keys, for clusters without IRSA.
        existingSecret: ""
    scrape:
      # CloudWatch granularity to request, in seconds. Most AWS namespaces emit at
      # 1 minute resolution but 5 minutes keeps GetMetricData costs low.
      period: 300
      # How far back to offset requests, in seconds. CloudWatch datapoints take a few
      # minutes to settle; querying too close to now returns partial data.
      delay: 300
      # Export 0 instead of NaN when a resource reports no data for an interval.
      nilToZero: true
    # Services to scrape using Metoro's curated metric sets.
    # Supported names: rds, sqs, lambda, alb, elasticache, dynamodb.
    services: []
    #  - name: rds
    #    regions: ["us-east-1"]            # optional, defaults to aws.regions
    #    searchTags:                       # optional, narrows discovery by resource tags
    #      - key: "environment"
    #        value: "production"           # value is a regex
    #    period: 60                        # optional, overrides scrape.period. The plugin polls
    #                                      # CloudWatch at the smallest period across all services,
    #                                      # so a low value here raises API cost for the whole plugin.
    #    metrics:                          # optional, replaces the curated metric set
    #      - name: "CPUUtilization"
    #        statistics: ["Average"]
    # Escape hatch: a verbatim YACE configuration (https://github.com/prometheus-community/yet-another-cloudwatch-exporter).
    # When set, `aws.stsRegion`, `scrape` and `services` are ignored.
    customConfig: ""
    serviceAccount:
      name: "metoro-plugin-cloudwatch"
      # Extra annotations for the service account, merged with the IRSA annotation.
      annotations: {}
    image:
      repository: quay.io/prometheuscommunity/yet-another-cloudwatch-exporter
      tag: "v0.65.0"
      pullPolicy: "IfNotPresent"
      imagePullSecrets: []
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    sidecar:
      image:
        repository: quay.io/metoro/opentelemetry-collector
        tag: "stable"
        pullPolicy: "Always"
      resources:
        limits:
          cpu: "250m"
          memory: "256Mi"
        requests:
          cpu: "50m"
          memory: "64Mi"
    scheduling:
      nodeSelector: {}
      affinity: {}
      tolerations: []
      priorityClassName: ""
      # How long the pod tolerates a NotReady/unreachable node before being evicted
      # and rescheduled. The plugin runs as a single replica, so this bounds the
      # metric gap after a node failure. The Kubernetes default is 300 seconds.
      nodeFailureEvictionSeconds: 60

serviceMonitorScraping:
  enabled: false

  collector:
    mode: statefulset
    replicas: 2
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    image:
      repository: quay.io/metoro/opentelemetry-collector
      tag: "stable"
      pullPolicy: Always
      imagePullSecrets: []
    resources: {}
    scheduling:
      nodeSelector: {}
      affinity: {}
      podAntiAffinity:
        enabled: true
      tolerations: []

  targetAllocator:
    enabled: true
    replicas: 2
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    image:
      repository: quay.io/metoro/opentelemetry-target-allocator
      tag: "stable"
      pullPolicy: Always
      imagePullSecrets: []
    allocationStrategy: consistent-hashing
    filterStrategy: relabel-config
    resources: {}
    scheduling:
      nodeSelector: {}
      affinity: {}
      podAntiAffinity:
        enabled: true
      tolerations: []
    prometheusCR:
      scrapeInterval: 30s
      serviceMonitorSelector: {}
      podMonitorSelector: {}
      namespaceSelector: {}
